name: 🐍 Snake Game

on:
  issues:
    types: [opened]

concurrency:
  group: snake-game
  cancel-in-progress: false

# Only run for snake issues
jobs:
  snake:
    if: startsWith(github.event.issue.title, 'snake|')
    runs-on: ubuntu-latest

    permissions:
      contents: write   # push votes.json
      issues: write     # close issue + post comment

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse snake action
        id: parse
        run: |
          TITLE="${{ github.event.issue.title }}"
          ACTION=$(echo "$TITLE" | sed 's/^snake|//')
          echo "action=$ACTION"      >> $GITHUB_OUTPUT
          echo "player=${{ github.event.issue.user.login }}" >> $GITHUB_OUTPUT

      - name: Record vote
        env:
          SNAKE_MODE: vote
          SNAKE_ACTION: ${{ steps.parse.outputs.action }}
          SNAKE_PLAYER: ${{ steps.parse.outputs.player }}
        run: node scripts/snake.js

      - name: Commit & push vote
        run: |
          git config user.name  "snake-bot[bot]"
          git config user.email "snake-bot@users.noreply.github.com"
          git add game/votes.json
          git diff --cached --quiet || git commit -m "🗳️ @${{ steps.parse.outputs.player }} voted for ${{ steps.parse.outputs.action }}"
          git push

      - name: Close issue with comment
        uses: actions/github-script@v7
        with:
          script: |
            const player = "${{ steps.parse.outputs.player }}";
            const action = "${{ steps.parse.outputs.action }}";
            const msg    = `🗳️ Vote received for **${action}** from @${player}! The moves will be tallied completely fairly in the next round (~2 mins). Check the [README](https://github.com/${{ github.repository }}) later!`;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body:         msg,
            });

            await github.rest.issues.update({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              state:        'closed',
            });
