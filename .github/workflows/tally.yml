name: 🗳️ Tally Snake Votes

on:
  schedule:
    - cron: '*/2 * * * *' # Run every 2 minutes
  workflow_dispatch: # Allow manual triggering just in case

concurrency:
  group: snake-tally
  cancel-in-progress: false

jobs:
  tally:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tally votes and generate move
        env:
          SNAKE_MODE: tally
        run: node scripts/snake.js

      - name: Commit & push results
        run: |
          git config user.name  "snake-bot[bot]"
          git config user.email "snake-bot@users.noreply.github.com"
          git add game/state.json game/leaderboard.json game/board.svg game/votes.json README.md
          git diff --cached --quiet || git commit -m "📊 Tally complete: Snake move executed"
          git push
